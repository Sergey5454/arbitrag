<!DOCTYPE html>
<html>
<head>
    <title>Arbitrage  Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gate.io Arbitrage Monitor</h1>
        
        <div class="controls">
            <label for="pairSelect">Торговая пара:</label>
            <select id="pairSelect"></select>
            <button id="saveConfig">Сохранить</button>
        </div>
        
        <div class="summary">
            <div class="card">Spot: <span id="spotPrice">-</span></div>
            <div class="card">Futures: <span id="futuresPrice">-</span></div>
            <div class="card">Basis %: <span id="basisPercent">-</span></div>
            <div class="card">Large trades (1h): <span id="largeCount">-</span></div>
        </div>
        
        <div class="charts">
            <canvas id="priceChart"></canvas>
            <canvas id="basisChart"></canvas>
        </div>
        
        <h2>Последние крупные сделки</h2>
        <table id="largeTradesTable">
            <thead>
                <tr><th>Время</th><th>Цена</th><th>Объём</th><th>Сторона</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
